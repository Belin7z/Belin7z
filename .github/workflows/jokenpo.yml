name: "🎮 Jokenô Bot"

on:
  issues:
    types: [opened]

jobs:
  jokenpo:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.title, 'jokenpo:')
    steps:
      - name: Responder Jokenô
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const player = context.payload.issue.user.login;
            
            let playerChoice = '';
            if (title.includes('pedra')) playerChoice = 'pedra';
            else if (title.includes('papel')) playerChoice = 'papel';
            else if (title.includes('tesoura')) playerChoice = 'tesoura';
            else return;

            const choices = ['pedra', 'papel', 'tesoura'];
            const emojis = { pedra: '\u270A', papel: '\u270B', tesoura: '\u270C\uFE0F' };
            const botChoice = choices[Math.floor(Math.random() * choices.length)];

            let result = '';
            if (playerChoice === botChoice) {
              result = '\uD83E\uDD1D Empate! Nenhum de n\u00F3s ganhou dessa vez...';
            } else if (
              (playerChoice === 'pedra' && botChoice === 'tesoura') ||
              (playerChoice === 'papel' && botChoice === 'pedra') ||
              (playerChoice === 'tesoura' && botChoice === 'papel')
            ) {
              result = `\uD83C\uDF89 **@${player} GANHOU!** Voc\u00EA \u00E9 bom demais! \uD83D\uDD25`;
            } else {
              result = `\uD83E\uDD16 **Belin7z Bot GANHOU!** Haha, melhor sorte na pr\u00F3xima! \uD83D\uDE08`;
            }

            const body = [
              `## \uD83C\uDFAE Resultado do Joken\u00F4`,
              ``,
              `| Jogador | Escolha |`,
              `|:---:|:---:|`,
              `| \uD83D\uDC64 @${player} | ${emojis[playerChoice]} **${playerChoice.charAt(0).toUpperCase() + playerChoice.slice(1)}** |`,
              `| \uD83E\uDD16 Belin7z Bot | ${emojis[botChoice]} **${botChoice.charAt(0).toUpperCase() + botChoice.slice(1)}** |`,
              ``,
              `### ${result}`,
              ``,
              `---`,
              `*Quer jogar de novo? Volte no perfil e clique em outro bot\u00E3o! \uD83D\uDE04*`,
              ``,
              `> *Esse bot foi feito com \u2764\uFE0F pelo pr\u00F3prio Belin7z usando GitHub Actions!*`
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              labels: ['jokenpo', '\uD83C\uDFAE jogou!']
            });
